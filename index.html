<!DOCTYPE html>
<html lang="pt" class="scroll-smooth">
<head>
  <script>
        (function() {
            const PASS_CORRETA = "euro2026"; 
            if (sessionStorage.getItem('auth_catalogo') !== 'true') {
                let tentativa = prompt("Acesso Privado EuroDrop. Insira a palavra-passe:");
                if (tentativa === PASS_CORRETA) {
                    sessionStorage.setItem('auth_catalogo', 'true');
                } else {
                    alert("Acesso negado.");
                    // Redireciona para o site oficial se errar
                    window.location.replace("https://eurodrop.pt"); 
                }
            }
        })();
    </script>

        tailwind.config = {

                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
