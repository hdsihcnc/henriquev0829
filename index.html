<!DOCTYPE html>
<html lang="pt" class="scroll-smooth">
<head>
    <script>
        (function() {
            const PASS_CORRETA = "euro2026"; 
            if (sessionStorage.getItem('auth_catalogo') !== 'true') {
                let tentativa = prompt("Acesso Privado EuroDrop. Insira a palavra-passe:");
                if (tentativa === PASS_CORRETA) {
                    sessionStorage.setItem('auth_catalogo', 'true');
                } else {
                    alert("Acesso negado.");
                    window.location.replace("https://eurodrop.pt"); 
                }
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuroDrop | Dashboard</title>
    <meta name="robots" content="noindex, nofollow">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: { brand: '#2563eb', brand_dark: '#1d4ed8', }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body class="font-sans text-gray-800 bg-gray-50 antialiased min-h-screen flex flex-col">

    <nav class="w-full bg-white border-b border-gray-100 py-4">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div class="font-bold text-2xl text-gray-900 tracking-tight">
                Euro<span class="text-brand">Drop</span>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="flex bg-gray-100 p-1 rounded-xl text-[10px] font-bold">
                    <button onclick="setLanguage('pt')" class="px-2 py-1 rounded-lg hover:bg-white transition" id="lang-pt">PT</button>
                    <button onclick="setLanguage('en')" class="px-2 py-1 rounded-lg hover:bg-white transition" id="lang-en">EN</button>
                    <button onclick="setLanguage('fr')" class="px-2 py-1 rounded-lg hover:bg-white transition" id="lang-fr">FR</button>
                </div>
                <div id="txt-nav-badge" class="text-[10px] font-black text-gray-400 uppercase tracking-widest bg-gray-100 px-3 py-1 rounded-full">
                    Dashboard
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-6 py-10">
        <div class="max-w-4xl w-full">
            <div class="text-center mb-10" data-aos="fade-down">
                <h1 id="txt-welcome" class="text-4xl md:text-5xl font-black text-gray-900 mb-4 tracking-tighter uppercase italic">Bem-vindo.</h1>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <a href="catalogo.html" class="group bg-white p-10 rounded-[2.5rem] border border-gray-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 flex flex-col items-center text-center" data-aos="fade-right">
                    <div class="w-20 h-20 bg-blue-50 text-brand rounded-3xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-500">
                        <i class="fa-solid fa-layer-group text-3xl"></i>
                    </div>
                    <h3 id="txt-mod-1" class="text-xl font-black text-gray-900 uppercase tracking-tight">Catálogo</h3>
                </a>

                <a href="personalized-catalog.html" class="group bg-white p-10 rounded-[2.5rem] border border-gray-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 flex flex-col items-center text-center" data-aos="fade-left">
                    <div class="w-20 h-20 bg-gray-50 text-gray-400 rounded-3xl flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-500">
                        <i class="fa-solid fa-clipboard-list text-3xl"></i>
                    </div>
                    <h3 id="txt-mod-2" class="text-xl font-black text-gray-900 uppercase tracking-tight">Catálogo Personalizado</h3>
                </a>
            </div>
        </div>
    </main>

    <footer class="pb-6 text-center text-[10px] font-bold text-gray-400 uppercase tracking-[0.3em]">
        <span id="txt-footer">© 2026 EuroDrop. Conteúdo Confidencial.</span>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, duration: 1000 });

        const translations = {
            pt: {
                welcome: "Bem-vindo.",
                navBadge: "Painel de Controlo",
                mod1: "Catálogo",
                mod2: "Catálogo Personalizado",
                footer: "© 2026 EuroDrop. Conteúdo Confidencial."
            },
            en: {
                welcome: "Welcome.",
                navBadge: "Dashboard",
                mod1: "Catalog",
                mod2: "Personalized Catalog",
                footer: "© 2026 EuroDrop. Confidential Content."
            },
            fr: {
                welcome: "Bienvenue.",
                navBadge: "Tableau de Bord",
                mod1: "Catalogue",
                mod2: "Catalogue Personnalisé",
                footer: "© 2026 EuroDrop. Contenu Confidentiel."
            }
        };

        function setLanguage(lang) {
            const t = translations[lang];
            document.getElementById('txt-welcome').innerText = t.welcome;
            document.getElementById('txt-nav-badge').innerText = t.navBadge;
            document.getElementById('txt-mod-1').innerText = t.mod1;
            document.getElementById('txt-mod-2').innerText = t.mod2;
            document.getElementById('txt-footer').innerText = t.footer;

            ['pt', 'en', 'fr'].forEach(l => {
                document.getElementById(`lang-${l}`).classList.toggle('bg-white', l === lang);
                document.getElementById(`lang-${l}`).classList.toggle('shadow-sm', l === lang);
            });
        }

        setLanguage('en');
    </script>
</body>
</html>
