<!DOCTYPE html>
<html lang="pt" class="scroll-smooth">
<head>
    <script>
        (function() {
            const CORRECT_PASSWORD = "Bijoumani@2026"; 
            if (sessionStorage.getItem('auth_user_adm') !== 'true') {
                let tentativa = prompt("EuroDrop Private Access. Enter the password:");
                if (tentativa === CORRECT_PASSWORD) {
                    sessionStorage.setItem('auth_user_adm', 'true');
                } else {
                    alert("Acesso negado.");
                    window.location.replace("https://eurodrop.pt"); 
                }
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EuroDrop | Dashboard</title>
    <meta name="robots" content="noindex, nofollow">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: { brand: '#2563eb', brand_dark: '#1d4ed8', }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body class="font-sans text-gray-800 bg-gray-50 antialiased min-h-screen flex flex-col">

    <nav class="fixed w-full top-0 bg-white/90 backdrop-blur-md z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <a href="index.html" class="font-bold text-xl md:text-2xl text-gray-900 tracking-tight hover:opacity-80 transition-opacity no-underline">
                Euro<span class="text-brand">Drop</span>
            </a>
            
            <div class="flex items-center gap-2 md:gap-4">
                <div class="bg-gray-100 px-2 py-1.5 md:px-3 md:py-2 rounded-xl">
                    <select id="lang-toggle" onchange="setLanguage(this.value)" class="bg-transparent text-xs md:text-sm font-semibold text-gray-700 outline-none cursor-pointer">
                        <option value="pt">PT</option>
                        <option value="en">EN</option>
                        <option value="fr">FR</option>
                    </select>
                </div>
                <button onclick="logout()" class="flex items-center justify-center bg-red-50 text-red-600 w-9 h-9 md:w-auto md:px-3 md:py-1.5 rounded-xl text-[10px] font-black uppercase hover:bg-red-100 transition active:scale-95">
                    <i class="fa-solid fa-right-from-bracket md:mr-2"></i>
                    <span id="txt-logout-nav" class="hidden md:inline">Sair</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="h-16"></div>

    <main class="flex-grow flex items-center justify-center px-6 py-8">
        <div class="max-w-4xl w-full">
            <div class="text-center mb-8" data-aos="fade-down">
                <h1 id="txt-welcome" class="text-3xl md:text-5xl font-black text-gray-900 mb-4 tracking-tighter uppercase italic">Bem-vindo.</h1>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                
                <a href="catalogo.html" class="group bg-white p-8 md:p-10 rounded-[2rem] md:rounded-[2.5rem] border border-gray-100 shadow-sm active:scale-95 md:hover:shadow-2xl transition-all duration-500 flex flex-col items-center text-center" data-aos="fade-up">
                    <div class="w-16 h-16 md:w-20 md:h-20 bg-blue-50 text-brand rounded-2xl md:rounded-3xl flex items-center justify-center mb-4 md:mb-6">
                        <i class="fa-solid fa-layer-group text-2xl md:text-3xl"></i>
                    </div>
                    <h3 id="txt-mod-1" class="text-lg md:text-xl font-black text-gray-900 uppercase tracking-tight">Catálogo</h3>
                </a>

                <a href="personalized-catalog.html" class="group bg-white p-8 md:p-10 rounded-[2rem] md:rounded-[2.5rem] border border-gray-100 shadow-sm active:scale-95 md:hover:shadow-2xl transition-all duration-500 flex flex-col items-center text-center" data-aos="fade-up" data-aos-delay="100">
                    <div class="w-16 h-16 md:w-20 md:h-20 bg-gray-50 text-gray-400 rounded-2xl md:rounded-3xl flex items-center justify-center mb-4 md:mb-6">
                        <i class="fa-solid fa-clipboard-list text-2xl md:text-3xl"></i>
                    </div>
                    <h3 id="txt-mod-2" class="text-lg md:text-xl font-black text-gray-900 uppercase tracking-tight">Catálogo Personalizado</h3>
                </a>

                <a href="returns.html" class="group bg-white p-8 md:p-10 rounded-[2rem] md:rounded-[2.5rem] border border-gray-100 shadow-sm active:scale-95 md:hover:shadow-2xl transition-all duration-500 flex flex-col items-center text-center" data-aos="fade-up" data-aos-delay="200">
                    <div class="w-16 h-16 md:w-20 md:h-20 bg-red-50 text-red-500 rounded-2xl md:rounded-3xl flex items-center justify-center mb-4 md:mb-6 group-hover:rotate-180 transition-transform duration-700">
                        <i class="fa-solid fa-arrow-rotate-left text-2xl md:text-3xl"></i>
                    </div>
                    <h3 id="txt-mod-3" class="text-lg md:text-xl font-black text-gray-900 uppercase tracking-tight italic">Devoluções</h3>
                </a>

            </div>
        </div>
    </main>

<footer class="bg-white border-t border-gray-100 pt-10 pb-8 text-center">
        <div class="font-bold text-xl md:text-2xl text-gray-900 mb-4 tracking-tight">
            Euro<span class="text-brand">Drop</span>
        </div>
        
        <br>
        <a href="mailto:geral@eurodrop.pt" class="inline-flex items-center text-gray-500 hover:text-brand transition-colors mb-6 font-bold text-[10px] md:text-xs uppercase tracking-widest">
            <i class="fa-regular fa-envelope mr-2 text-brand"></i>geral@eurodrop.pt
        </a>
        <div class="text-[9px] md:text-[10px] text-gray-400 font-bold uppercase tracking-[0.2em] md:tracking-[0.3em] px-4 leading-relaxed">
            <p id="txt-copyright">© 2026 EuroDrop. Todos os direitos reservados.</p>
            <p id="txt-confidential">Conteúdo Confidencial</p>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, duration: 800 });

        const translations = {
            pt: { 
                welcome: "Bem-vindo.", 
                mod1: "Catálogo", 
                mod2: "Catálogo Personalizado", 
                mod3: "Devoluções",
                copyright: "© 2026 EuroDrop. Todos os direitos reservados.",
                confidential: "Conteúdo Confidencial",
                logout: "Sair" 
            },
            en: { 
                welcome: "Welcome.", 
                mod1: "Catalog", 
                mod2: "Personalized Catalog", 
                mod3: "Returns",
                copyright: "© 2026 EuroDrop. All rights reserved.",
                confidential: "Confidential Content",
                logout: "Logout" 
            },
            fr: { 
                welcome: "Bienvenue.", 
                mod1: "Catalogue", 
                mod2: "Catalogue Personnalisé", 
                mod3: "Retours",
                copyright: "© 2026 EuroDrop. Tous droits réservés.",
                confidential: "Contenu Confidentiel",
                logout: "Quitter" 
            }
        };

        function setLanguage(lang) {
            const t = translations[lang];
            document.getElementById('txt-welcome').innerText = t.welcome;
            document.getElementById('txt-mod-1').innerText = t.mod1;
            document.getElementById('txt-mod-2').innerText = t.mod2;
            document.getElementById('txt-mod-3').innerText = t.mod3;
            document.getElementById('txt-copyright').innerText = t.copyright;
            document.getElementById('txt-confidential').innerText = t.confidential;
            const logoutNav = document.getElementById('txt-logout-nav');
            if(logoutNav) logoutNav.innerText = t.logout;
            document.getElementById('lang-toggle').value = lang;
            localStorage.setItem('selectedLang', lang);
        }

        function logout() {
            sessionStorage.removeItem('auth_user_adm');
            window.location.replace("https://eurodrop.pt");
        }

        window.onload = () => {
            const savedLang = localStorage.getItem('selectedLang') || 'en';
            setLanguage(savedLang);
        };
    </script>
</body>
</html>
