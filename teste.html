<!DOCTYPE html>
<html lang="pt" class="scroll-smooth">
<head>
    <script>
        (function() {
            const CORRECT_PASSWORD = "euro2026"; 
            if (sessionStorage.getItem('auth_catalogo') !== 'true') {
                let tentativa = prompt("EuroDrop Private Access. Enter the password:");
                if (tentativa === CORRECT_PASSWORD) {
                    sessionStorage.setItem('auth_catalogo', 'true');
                } else {
                    alert("Acesso negado.");
                    window.location.replace("https://eurodrop.pt"); 
                }
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuroDrop | Catálogo de Referências</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: { brand: '#2563eb', brand_dark: '#1d4ed8', }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scroll { overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #2563eb; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">

    <nav class="fixed w-full bg-white/90 backdrop-blur-md z-40 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex justify-between items-center">
            <div class="font-black text-2xl tracking-tighter cursor-pointer" onclick="window.location.href='index.html'">
                Euro<span class="text-brand">Drop</span>
            </div>
            
            <button onclick="toggleCart()" class="relative bg-gray-100 p-3 rounded-2xl hover:bg-gray-200 transition-all active:scale-95">
                <i class="fa-solid fa-clipboard-list text-xl text-gray-700"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-brand text-white text-[10px] font-black w-6 h-6 flex items-center justify-center rounded-full border-2 border-white hidden">0</span>
            </button>
        </div>
    </nav>

    <main class="pt-28 pb-20 px-4 max-w-5xl mx-auto">
        <div class="text-center mb-16" data-aos="fade-down">
            <h2 class="text-4xl font-black mb-4 tracking-tight text-gray-900 uppercase">Referências Ativas</h2>
            <p class="text-gray-500 text-sm font-medium">Selecione o modelo para detalhes de fornecimento.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mb-10">
            <div class="bg-white rounded-[2.5rem] p-8 border border-gray-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 cursor-pointer group" onclick="openModal('p1')" data-aos="fade-up">
                <div class="bg-gray-50 rounded-[2rem] p-10 mb-6 overflow-hidden text-center">
                    <img src="assets/img/jew-01-grn.jpg" class="h-72 w-full object-contain group-hover:scale-110 transition-transform duration-500">
                </div>
                <h3 class="font-black text-xl text-gray-400 tracking-widest uppercase text-center">JEW-01-SERIES</h3>
            </div>

            <div class="bg-white rounded-[2.5rem] p-8 border border-gray-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 cursor-pointer group" onclick="openModal('p2')" data-aos="fade-up">
                <div class="bg-gray-50 rounded-[2rem] p-10 mb-6 overflow-hidden text-center">
                    <img src="assets/img/jew-02-grn.jpg" class="h-72 w-full object-contain group-hover:scale-110 transition-transform duration-500">
                </div>
                <h3 class="font-black text-xl text-gray-400 tracking-widest uppercase text-center">JEW-02-SERIES</h3>
            </div>

            <div class="bg-white rounded-[2.5rem] p-8 border border-gray-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 cursor-pointer group" onclick="openModal('p3')" data-aos="fade-up">
                <div class="bg-gray-50 rounded-[2rem] p-10 mb-6 overflow-hidden text-center">
                    <img src="assets/img/jew-03-grn.jpg" class="h-72 w-full object-contain group-hover:scale-110 transition-transform duration-500">
                </div>
                <h3 class="font-black text-xl text-gray-400 tracking-widest uppercase text-center">JEW-03-SERIES</h3>
            </div>

            <div class="bg-white rounded-[2.5rem] p-8 border border-gray-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 cursor-pointer group" onclick="openModal('p4')" data-aos="fade-up">
                <div class="bg-gray-50 rounded-[2rem] p-10 mb-6 overflow-hidden text-center">
                    <img src="assets/img/jew-04-grn.jpg" class="h-72 w-full object-contain group-hover:scale-110 transition-transform duration-500">
                </div>
                <h3 class="font-black text-xl text-gray-400 tracking-widest uppercase text-center">JEW-04-SERIES</h3>
            </div>
        </div>

        <div class="flex justify-center">
            <div class="w-full md:w-1/2 bg-white rounded-[2.5rem] p-8 border border-gray-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 cursor-pointer group" onclick="openModal('p5')" data-aos="fade-up">
                <div class="bg-gray-50 rounded-[2rem] p-10 mb-6 overflow-hidden text-center">
                    <img src="assets/img/jew-05-grn.jpg" class="h-72 w-full object-contain group-hover:scale-110 transition-transform duration-500">
                </div>
                <h3 class="font-black text-xl text-gray-400 tracking-widest uppercase text-center">JEW-05-SERIES</h3>
            </div>
        </div>
    </main>

    <div id="productModal" class="fixed inset-0 bg-white z-[60] hidden overflow-y-auto">
        <button onclick="closeModal()" class="fixed top-6 right-6 z-[70] bg-gray-100 w-12 h-12 rounded-full flex items-center justify-center hover:bg-gray-200 transition shadow-sm">
            <i class="fa-solid fa-xmark text-xl text-gray-900"></i>
        </button>

        <div class="flex flex-col md:flex-row min-h-screen">
            <div class="md:w-3/5 bg-gray-50 flex items-center justify-center p-8 md:p-20 border-r border-gray-100">
                <img id="modal-img" src="" class="max-w-full max-h-[70vh] object-contain drop-shadow-2xl transition-all duration-500">
            </div>

            <div class="md:w-2/5 p-8 md:p-16 flex flex-col justify-center bg-white">
                <div class="max-w-md mx-auto w-full">
                    <span class="text-brand font-bold text-[10px] uppercase tracking-[0.3em] mb-3 block">Referência Selecionada</span>
                    <h3 id="modal-title" class="text-3xl md:text-5xl font-black text-gray-900 mb-10 leading-tight tracking-tighter uppercase">---</h3>
                    
                    <div class="grid grid-cols-1 gap-3 mb-10">
                        <div class="flex justify-between items-center p-5 bg-blue-50/50 rounded-2xl border border-blue-100/50">
                            <span class="text-[10px] font-black text-brand uppercase tracking-widest">Preço Final (c/ Envio)</span>
                            <p id="modal-price-in" class="text-xl font-black text-brand">€0.00</p>
                        </div>
                        <div class="flex justify-between items-center p-5 bg-gray-50 rounded-2xl border border-gray-100">
                            <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Preço Base (s/ Envio)</span>
                            <p id="modal-price-out" class="text-xl font-black text-gray-900">€0.00</p>
                        </div>
                    </div>

                    <div class="mb-12">
                        <label class="text-[10px] font-black text-gray-900 uppercase tracking-[0.2em] block mb-5">Variações Disponíveis</label>
                        <div id="variant-options" class="grid grid-cols-2 gap-3"></div>
                    </div>

                    <button onclick="addToCart()" class="w-full bg-brand text-white font-black py-6 rounded-2xl hover:bg-brand_dark transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-2xl flex items-center justify-center gap-4 text-xs tracking-[0.2em]">
                        <i class="fa-solid fa-plus text-base"></i>
                        ADICIONAR AO PEDIDO
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="cartPanel" class="fixed inset-y-0 right-0 w-full md:w-[450px] bg-white shadow-2xl z-[80] transform translate-x-full transition-transform duration-500 ease-in-out p-8 flex flex-col border-l border-gray-100">
        <div class="flex justify-between items-center mb-10 pb-6 border-b border-gray-50">
            <h3 class="text-2xl font-black text-gray-900 tracking-tighter uppercase">Pedido Sourcing</h3>
            <button onclick="toggleCart()" class="bg-gray-50 w-10 h-10 rounded-full flex items-center justify-center hover:bg-gray-100 transition">
                <i class="fa-solid fa-arrow-right text-gray-400"></i>
            </button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto space-y-3"></div>
        <form action="https://formspree.io/f/teu_id_aqui" method="POST" id="orderForm" class="mt-10 pt-8 border-t border-gray-100">
            <input type="hidden" name="Pedido" id="form-order-data">
            <input type="email" name="email" placeholder="Vosso Email" required class="w-full bg-gray-50 border-none rounded-2xl px-6 py-4 mb-4 outline-none focus:ring-2 focus:ring-brand font-bold text-sm">
            <button type="submit" class="w-full bg-gray-900 text-white font-black py-6 rounded-2xl uppercase text-[10px] tracking-[0.3em]">Finalizar</button>
        </form>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });

        const products = {
            p1: { 
                priceIn: "€2.99", priceOut: "€1.50", 
                variants: [
                    { sku: "JEW-01-GRN", img: "assets/img/jew-01-grn.jpg" },
                    { sku: "JEW-01-BLU", img: "assets/img/jew-01-blu.jpg" }
                ] 
            },
            p2: { 
                priceIn: "€4.99", priceOut: "€3.00", 
                variants: [
                    { sku: "JEW-02-GRN", img: "assets/img/jew-02-grn.jpg" },
                    { sku: "JEW-02-RED", img: "assets/img/jew-02-red.jpg" }
                ] 
            },
            p3: { 
                priceIn: "€9.99", priceOut: "€6.50", 
                variants: [
                    { sku: "JEW-03-GRN", img: "assets/img/jew-03-grn.jpg" },
                    { sku: "JEW-03-BLK", img: "assets/img/jew-03-blk.jpg" }
                ] 
            },
            p4: { 
                priceIn: "€3.50", priceOut: "€2.00", 
                variants: [
                    { sku: "JEW-04-GRN", img: "assets/img/jew-04-grn.jpg" },
                    { sku: "JEW-04-WHT", img: "assets/img/jew-04-wht.jpg" }
                ] 
            },
            p5: { 
                priceIn: "€15.00", priceOut: "€10.00", 
                variants: [
                    { sku: "JEW-05-GRN", img: "assets/img/jew-05-grn.jpg" },
                    { sku: "JEW-05-BLU", img: "assets/img/jew-05-blu.jpg" },
                    { sku: "JEW-05-GLD", img: "assets/img/jew-05-gld.jpg" }
                ] 
            }
        };

        let currentProductData = null;
        let selectedVariant = null;
        let cart = [];

        function openModal(id) {
            currentProductData = products[id];
            selectVariant(0); // Seleciona a primeira variante por padrão
            
            const variantContainer = document.getElementById('variant-options');
            variantContainer.innerHTML = '';
            
            currentProductData.variants.forEach((v, index) => {
                const btn = document.createElement('button');
                btn.id = `v-btn-${index}`;
                btn.className = 'variant-btn p-4 rounded-2xl border-2 border-gray-100 bg-white text-gray-400 text-[10px] font-black uppercase transition-all hover:border-brand hover:text-brand';
                btn.innerHTML = v.sku;
                btn.onclick = () => selectVariant(index);
                variantContainer.appendChild(btn);
            });

            updateButtonStyles(0);
            document.getElementById('productModal').classList.remove('hidden');
            document.body.classList.add('no-scroll');
        }

        function selectVariant(index) {
            selectedVariant = currentProductData.variants[index];
            document.getElementById('modal-title').innerText = selectedVariant.sku;
            document.getElementById('modal-img').src = selectedVariant.img;
            document.getElementById('modal-price-in').innerText = currentProductData.priceIn;
            document.getElementById('modal-price-out').innerText = currentProductData.priceOut;
            updateButtonStyles(index);
        }

        function updateButtonStyles(selectedIndex) {
            document.querySelectorAll('.variant-btn').forEach((btn, idx) => {
                if (idx === selectedIndex) {
                    btn.classList.add('border-brand', 'bg-blue-50', 'text-brand');
                    btn.classList.remove('border-gray-100', 'bg-white', 'text-gray-400');
                } else {
                    btn.classList.remove('border-brand', 'bg-blue-50', 'text-brand');
                    btn.classList.add('border-gray-100', 'bg-white', 'text-gray-400');
                }
            });
        }

        function closeModal() {
            document.getElementById('productModal').classList.add('hidden');
            document.body.classList.remove('no-scroll');
        }

        function addToCart() {
            cart.push({ sku: selectedVariant.sku });
            updateCartUI();
            closeModal();
            toggleCart(true);
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            cart.forEach((item, index) => {
                container.innerHTML += `<div class="flex justify-between items-center bg-gray-50 p-5 rounded-2xl border border-gray-100 font-black text-[10px] uppercase tracking-widest">${item.sku}<button onclick="removeFromCart(${index})" class="text-red-500 font-bold">X</button></div>`;
            });
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-count').classList.toggle('hidden', cart.length === 0);
            document.getElementById('form-order-data').value = cart.map(i => i.sku).join(', ');
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function toggleCart(open = null) {
            const panel = document.getElementById('cartPanel');
            if (open === true) panel.classList.remove('translate-x-full');
            else if (open === false) panel.classList.add('translate-x-full');
            else panel.classList.toggle('translate-x-full');
        }
    </script>
</body>
</html>
