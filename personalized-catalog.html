<!DOCTYPE html>
<html lang="pt" class="scroll-smooth">
<head>
    <script>
        (function() {
            const CORRECT_PASSWORD = "euro2026"; 
            if (sessionStorage.getItem('auth_catalogo') !== 'true') {
                let tentativa = prompt("EuroDrop Private Access. Enter the password:");
                if (tentativa === CORRECT_PASSWORD) {
                    sessionStorage.setItem('auth_catalogo', 'true');
                } else {
                    alert("Acesso negado.");
                    window.location.replace("https://eurodrop.pt"); 
                }
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuroDrop | Catálogo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: { brand: '#2563eb', brand_dark: '#1d4ed8', }
                }

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<body class="bg-gray-50 text-gray-800 antialiased flex flex-col min-h-screen">

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex justify-between items-center">

                <div class="font-black text-2xl tracking-tighter cursor-pointer" onclick="window.location.href='index.html'">
                    Euro<span class="text-brand">Drop</span>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="flex bg-gray-100 p-1 rounded-xl text-[10px] font-bold">
                    <button onclick="setLanguage('pt')" class="px-2 py-1 rounded-lg hover:bg-white transition" id="lang-pt">PT</button>
                    <button onclick="setLanguage('en')" class="px-2 py-1 rounded-lg hover:bg-white transition" id="lang-en">EN</button>
                    <button onclick="setLanguage('fr')" class="px-2 py-1 rounded-lg hover:bg-white transition" id="lang-fr">FR</button>
                </div>

                <button onclick="toggleCart()" class="relative bg-gray-100 p-3 rounded-2xl hover:bg-gray-200 transition-all active:scale-95">
                    <i class="fa-solid fa-clipboard-list text-xl text-gray-700"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-brand text-white text-[10px] font-black w-6 h-6 flex items-center justify-center rounded-full border-2 border-white hidden">0</span>
                </button>

                <div class="h-6 w-[1px] bg-gray-200 mx-1"></div>

                <button onclick="logout()" class="flex items-center gap-2 bg-red-50 text-red-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-red-100 transition active:scale-95">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span id="txt-logout">Sair</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="pt-28 pb-20 px-4 max-w-5xl mx-auto flex-grow">
        <div class="text-center mb-12" data-aos="fade-down">
            <h2 id="txt-title" class="text-4xl font-black mb-4 tracking-tight text-gray-900 uppercase italic">Produtos Sugeridos</h2>
            <div class="inline-flex items-center gap-2 bg-green-50 text-green-700 px-4 py-2 rounded-full border border-green-100 shadow-sm">

                <span id="txt-free-shipping" class="text-[10px] font-black uppercase tracking-wider">Entrega grátis para toda a Europa</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mb-10">
            <div class="bg-white rounded-[2.5rem] p-8 border border-gray-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 cursor-pointer group" onclick="openModal('p1')" data-aos="fade-up">
                <div class="bg-gray-50 rounded-[2rem] p-10 mb-6 overflow-hidden text-center">
                    <img src="assets/img/jew-01-grn.jpg" class="h-72 w-full object-contain group-hover:scale-110 transition-transform duration-500">
                </div>

            </div>
            <div class="bg-white rounded-[2.5rem] p-8 border border-gray-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 cursor-pointer group" onclick="openModal('p2')" data-aos="fade-up">
                <div class="bg-gray-50 rounded-[2rem] p-10 mb-6 overflow-hidden text-center">
                    <img src="assets/img/jew-02-grn.jpg" class="h-72 w-full object-contain group-hover:scale-110 transition-transform duration-500">
                </div>
                <h3 class="font-black text-xl text-gray-400 tracking-widest uppercase text-center">JEW-02-SERIES</h3>
            </div>
            <div class="bg-white rounded-[2.5rem] p-8 border border-gray-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 cursor-pointer group" onclick="openModal('p3')" data-aos="fade-up">
                <div class="bg-gray-50 rounded-[2rem] p-10 mb-6 overflow-hidden text-center">
                    <img src="assets/img/jew-03-grn.jpg" class="h-72 w-full object-contain group-hover:scale-110 transition-transform duration-500">
                </div>
                <h3 class="font-black text-xl text-gray-400 tracking-widest uppercase text-center">JEW-03-SERIES</h3>
            </div>
            <div class="bg-white rounded-[2.5rem] p-8 border border-gray-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 cursor-pointer group" onclick="openModal('p4')" data-aos="fade-up">
                <div class="bg-gray-50 rounded-[2rem] p-10 mb-6 overflow-hidden text-center">
                    <img src="assets/img/jew-04-grn.jpg" class="h-72 w-full object-contain group-hover:scale-110 transition-transform duration-500">
                </div>
                <h3 class="font-black text-xl text-gray-400 tracking-widest uppercase text-center">JEW-04-SERIES</h3>
            </div>
        </div>

        <div class="flex justify-center">
            <div class="w-full md:w-1/2 bg-white rounded-[2.5rem] p-8 border border-gray-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 cursor-pointer group" onclick="openModal('p5')" data-aos="fade-up">
                <div class="bg-gray-50 rounded-[2rem] p-10 mb-6 overflow-hidden text-center">
                    <img src="assets/img/jew-05-grn.jpg" class="h-72 w-full object-contain group-hover:scale-110 transition-transform duration-500">
                </div>
                <h3 class="font-black text-xl text-gray-400 tracking-widest uppercase text-center">JEW-05-SERIES</h3>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-100 pt-12 pb-8 text-center">
        <div class="font-black text-xl text-gray-900 mb-4 tracking-tighter uppercase italic">
            Euro<span class="text-brand">Drop</span>
        </div>
        <a href="mailto:geral@eurodrop.pt" class="inline-flex items-center text-gray-500 hover:text-brand transition-colors mb-6 font-bold text-xs uppercase tracking-widest">
            <i class="fa-regular fa-envelope mr-2 text-brand"></i>geral@eurodrop.pt
        </a>
        <div class="text-[10px] text-gray-400 font-bold uppercase tracking-[0.3em]">
            &copy; 2026 EuroDrop. Conteúdo Confidencial.
        </div>

    <div id="productModal" class="fixed inset-0 bg-white z-[60] hidden overflow-y-auto">
        <button onclick="closeModal()" class="fixed top-6 right-6 z-[70] bg-gray-100 w-12 h-12 rounded-full flex items-center justify-center hover:bg-gray-200 transition shadow-sm">
            <i class="fa-solid fa-xmark text-xl text-gray-900"></i>
        </button>

        <div class="flex flex-col md:flex-row min-h-screen">
            <div class="md:w-3/5 bg-gray-50 flex items-center justify-center p-8 md:p-20 border-r border-gray-100">
                <img id="modal-img" src="" class="max-w-full max-h-[70vh] object-contain drop-shadow-2xl transition-all duration-500">
            </div>

            <div class="md:w-2/5 p-8 md:p-16 flex flex-col justify-center bg-white">
                <div class="max-w-md mx-auto w-full">
                    <span id="txt-ref-selected" class="text-brand font-bold text-[10px] uppercase tracking-[0.3em] mb-3 block">Referência Selecionada</span>
                    <h3 id="modal-title" class="text-3xl md:text-5xl font-black text-gray-900 mb-10 leading-tight tracking-tighter uppercase">---</h3>
                    
                    <div class="grid grid-cols-1 gap-3 mb-10">
                        <div class="flex justify-between items-center p-5 bg-blue-50/50 rounded-2xl border border-blue-100/50">
                            <span id="txt-price-final" class="text-[10px] font-black text-brand uppercase tracking-widest">Preço Final (c/ Envio)</span>
                            <p id="modal-price-in" class="text-xl font-black text-brand">€0.00</p>
                        </div>
                    </div>

                    <div class="mb-12">
                        <label id="txt-variants" class="text-[10px] font-black text-gray-900 uppercase tracking-[0.2em] block mb-5">Variações Disponíveis</label>
                        <div id="variant-options" class="grid grid-cols-2 gap-3"></div>
                    </div>

                    <button onclick="addToCart()" class="w-full bg-brand text-white font-black py-6 rounded-2xl hover:bg-brand_dark transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-2xl flex items-center justify-center gap-4 text-xs tracking-[0.2em]">
                        <i class="fa-solid fa-plus text-base"></i>
                        <span id="txt-add-cart">ADICIONAR AO PEDIDO</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="cartPanel" class="fixed inset-y-0 right-0 w-full md:w-[450px] bg-white shadow-2xl z-[80] transform translate-x-full transition-transform duration-500 ease-in-out p-8 flex flex-col border-l border-gray-100">
        <div class="flex justify-between items-center mb-10 pb-6 border-b border-gray-50">
            <h3 id="txt-cart-title" class="text-2xl font-black text-gray-900 tracking-tighter uppercase">Pedido Sourcing</h3>
            <button onclick="toggleCart()" class="bg-gray-50 w-10 h-10 rounded-full flex items-center justify-center hover:bg-gray-100 transition">
                <i class="fa-solid fa-arrow-right text-gray-400"></i>
            </button>
        </div>

        <div id="cart-items" class="flex-grow overflow-y-auto space-y-3"></div>

        <form id="orderForm" class="mt-10 pt-8 border-t border-gray-100">
            <input type="hidden" name="Lista de Pedidos" id="form-order-data">
            <button type="submit" id="submit-btn" class="w-full bg-gray-900 text-white font-black py-6 rounded-2xl uppercase text-[10px] tracking-[0.3em]">Finalizar Pedido</button>
            <p id="form-status" class="mt-4 text-center text-xs font-bold uppercase hidden"></p>
        </form>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });

        const translations = {
            pt: {
                title: "Produtos Sugeridos",
                freeShipping: "Entrega grátis para toda a Europa",
                refSelected: "Referência Selecionada",
                priceFinal: "Preço Final (c/ Envio)",
                variants: "Variações Disponíveis",
                addCart: "ADICIONAR AO PEDIDO",
                cartTitle: "Pedido Sourcing",
                finish: "Finalizar Pedido",
                sending: "ENVIANDO...",
                success: "SUCESSO! Pedido enviado.",
                error: "ERRO ao enviar.",
                empty: "O carrinho está vazio!",
                product: "Produto",
                model: "Modelo",
                qty: "Qtd",
                logout: "Sair"
            },
            en: {
                title: "Suggested Products",
                freeShipping: "Free shipping all over Europe",
                refSelected: "Selected Reference",
                priceFinal: "Final Price (inc. Shipping)",
                variants: "Available Variations",
                addCart: "ADD TO ORDER",
                cartTitle: "Sourcing Request",
                finish: "Finish Order",
                sending: "SENDING...",
                success: "SUCCESS! Order sent.",
                error: "ERROR sending.",
                empty: "Cart is empty!",
                product: "Product",
                model: "Model",
                qty: "Qty",
                logout: "Logout"
            },
            fr: {
                title: "Produits Suggérés",
                freeShipping: "Livraison gratuite dans toute l'Europe",
                refSelected: "Référence Sélectionnée",
                priceFinal: "Prix Final (Livraison inc.)",
                variants: "Variantes Disponibles",
                addCart: "AJOUTER À LA COMMANDE",
                cartTitle: "Demande Sourcing",
                finish: "Finaliser la Commande",
                sending: "ENVOI EN COURS...",
                success: "SUCCÈS! Commande envoyée.",
                error: "ERREUR d'envoi.",
                empty: "Le panier est vide!",
                product: "Produit",
                model: "Modèle",
                qty: "Qté",
                logout: "Quitter"
            }
        };

        let currentLang = 'pt';

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('txt-free-shipping').innerText = t.freeShipping;
            document.getElementById('txt-ref-selected').innerText = t.refSelected;
            document.getElementById('txt-price-final').innerText = t.priceFinal;
            document.getElementById('txt-variants').innerText = t.variants;
            document.getElementById('txt-add-cart').innerText = t.addCart;
            document.getElementById('txt-cart-title').innerText = t.cartTitle;
            document.getElementById('submit-btn').innerText = t.finish;
            document.getElementById('txt-logout').innerText = t.logout;
            
            ['pt', 'en', 'fr'].forEach(l => {
                const el = document.getElementById(`lang-${l}`);
                if(el){
                    el.classList.toggle('bg-white', l === lang);
                    el.classList.toggle('shadow-sm', l === lang);
                }
            });
            updateCartUI();
        }

        const products = {
            p1: { name: "JEW-01", priceIn: "€12.99", variants: [{ sku: "JEW-01-GRN", img: "assets/img/jew-01-grn.jpg" }, { sku: "JEW-01-GRY", img: "assets/img/jew-01-gry.jpg" }, { sku: "JEW-01-RED", img: "assets/img/jew-01-red.jpg" }] },
            p2: { name: "JEW-02", priceIn: "€12.99", variants: [{ sku: "JEW-02-GRN", img: "assets/img/jew-02-grn.jpg" }, { sku: "JEW-02-GRY", img: "assets/img/jew-02-gry.jpg" }, { sku: "JEW-02-RED", img: "assets/img/jew-02-red.jpg" }, { sku: "JEW-02-BLK", img: "assets/img/jew-02-blk.jpg" }] },
            p3: { name: "JEW-03", priceIn: "€12.99", variants: [{ sku: "JEW-03-GRN", img: "assets/img/jew-03-grn.jpg" }, { sku: "JEW-03-GRY", img: "assets/img/jew-03-gry.jpg" }, { sku: "JEW-03-RED", img: "assets/img/jew-03-red.jpg" }, { sku: "JEW-03-BLK", img: "assets/img/jew-03-blk.jpg" }] },
            p4: { name: "JEW-04", priceIn: "€12.99", variants: [{ sku: "JEW-04-GRN", img: "assets/img/jew-04-grn.jpg" }, { sku: "JEW-04-GRY", img: "assets/img/jew-04-gry.jpg" }, { sku: "JEW-04-RED", img: "assets/img/jew-04-red.jpg" }, { sku: "JEW-04-BLK", img: "assets/img/jew-04-blk.jpg" }] },
            p5: { name: "JEW-05", priceIn: "€13.99", variants: [{ sku: "JEW-05-GRN", img: "assets/img/jew-05-grn.jpg" }, { sku: "JEW-05-PNK", img: "assets/img/jew-05-pnk.jpg" }, { sku: "JEW-05-WH", img: "assets/img/jew-05-wh.jpg" }, { sku: "JEW-05-BLK", img: "assets/img/jew-05-blk.jpg" }] }
        };

        let currentProductData = null;
        let selectedVariant = null;
        let cart = [];

        function openModal(id) {
            currentProductData = products[id];
            selectVariant(0);
            const variantContainer = document.getElementById('variant-options');
            variantContainer.innerHTML = '';
            currentProductData.variants.forEach((v, index) => {
                const btn = document.createElement('button');
                btn.className = 'variant-btn p-4 rounded-2xl border-2 border-gray-100 bg-white text-gray-400 text-[10px] font-black uppercase transition-all hover:border-brand hover:text-brand';
                btn.innerHTML = v.sku;
                btn.onclick = () => selectVariant(index);
                variantContainer.appendChild(btn);
            });
            updateButtonStyles(0);
            document.getElementById('productModal').classList.remove('hidden');
            document.body.classList.add('no-scroll');
        }

        function selectVariant(index) {
            selectedVariant = currentProductData.variants[index];
            document.getElementById('modal-title').innerText = selectedVariant.sku;
            document.getElementById('modal-img').src = selectedVariant.img;
            document.getElementById('modal-price-in').innerText = currentProductData.priceIn;
            updateButtonStyles(index);
        }

        function updateButtonStyles(selectedIndex) {
            document.querySelectorAll('.variant-btn').forEach((btn, idx) => {
                if (idx === selectedIndex) {
                    btn.classList.add('border-brand', 'bg-blue-50', 'text-brand');
                    btn.classList.remove('border-gray-100', 'bg-white', 'text-gray-400');
                } else {
                    btn.classList.remove('border-brand', 'bg-blue-50', 'text-brand');
                    btn.classList.add('border-gray-100', 'bg-white', 'text-gray-400');
                }
            });
        }

        function closeModal() {
            document.getElementById('productModal').classList.add('hidden');
            document.body.classList.remove('no-scroll');
        }

        function addToCart() {
            const existing = cart.find(i => i.sku === selectedVariant.sku);
            if(existing) {
                existing.qty++;
            } else {
                cart.push({ name: currentProductData.name, sku: selectedVariant.sku, qty: 1 });
            }
            updateCartUI();
            closeModal();
            toggleCart(true);
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            const t = translations[currentLang];
            
            cart.forEach((item, index) => {
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl border border-gray-100">
                        <div class="flex flex-col">
                            <span class="text-[9px] font-black text-gray-400 uppercase leading-none mb-1">${t.product}: ${item.name}</span>
                            <span class="text-[10px] font-bold text-gray-900 uppercase tracking-tight">${item.sku}</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="flex items-center bg-white rounded-lg border border-gray-200 px-2 py-1">
                                <button onclick="changeQty(${index}, -1)" class="text-xs font-bold px-1">-</button>
                                <span class="text-[10px] font-black px-2">${item.qty}</span>
                                <button onclick="changeQty(${index}, 1)" class="text-xs font-bold px-1">+</button>
                            </div>
                            <button onclick="removeFromCart(${index})" class="text-red-500 text-xs font-black ml-1"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`;
            });
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-count').classList.toggle('hidden', cart.length === 0);
            
            const summary = cart.map(i => `${t.product}: ${i.name} | ${t.model}: ${i.sku} | ${t.qty}: ${i.qty}`).join('\n');
            document.getElementById('form-order-data').value = summary;
        }

        function changeQty(index, val) {
            cart[index].qty += val;
            if(cart[index].qty < 1) cart.splice(index, 1);
            updateCartUI();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function toggleCart(open = null) {
            const panel = document.getElementById('cartPanel');
            if (open === true) panel.classList.remove('translate-x-full');
            else if (open === false) panel.classList.add('translate-x-full');
            else panel.classList.toggle('translate-x-full');
        }

        function logout() {
            sessionStorage.removeItem('auth_catalogo');
            window.location.replace("https://eurodrop.pt");
        }

        const form = document.getElementById("orderForm");
        form.addEventListener("submit", async function(event) {
            event.preventDefault();
            const t = translations[currentLang];
            if (cart.length === 0) return alert(t.empty);

            const status = document.getElementById("form-status");
            const btn = document.getElementById("submit-btn");
            
            btn.disabled = true;
            btn.innerText = t.sending;
            status.classList.remove("hidden");
            status.innerText = "...";

            const data = new FormData(event.target);
            fetch("https://formspree.io/f/xqeworjj", {
                method: "POST",
                body: data,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    status.innerText = t.success;
                    status.style.color = "green";
                    cart = [];
                    updateCartUI();
                    setTimeout(() => { 
                        toggleCart(false); 
                        status.classList.add("hidden");
                        btn.disabled = false;
                        btn.innerText = t.finish;
                    }, 2500);
                } else {
                    status.innerText = t.error;
                    status.style.color = "red";
                    btn.disabled = false;
                    btn.innerText = t.finish;
                }
            }).catch(() => {
                status.innerText = "Error";
                btn.disabled = false;
                btn.innerText = t.finish;
            });
        });

        setLanguage('en');
    </script>
</body>
</html>
